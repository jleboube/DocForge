services:
  mongodb:
    image: mongo:7
    container_name: docforge-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongodb/init.js:/docker-entrypoint-initdb.d/01-init.js:ro
      - ./mongodb/indexes.js:/docker-entrypoint-initdb.d/02-indexes.js:ro

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: docforge-api
    restart: unless-stopped
    ports:
      - "48080:8080"
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=production
      - API_PORT=8080
      - MONGO_URI=mongodb://mongodb:27017/docforge
      - DOCUMENT_STORE_ROOT=${DOCUMENT_STORE_ROOT:-/var/docforge/store}
      - CHUNK_SIZE=500
      - CHUNK_OVERLAP=100
      - EMBEDDING_MODEL=docforge-hash-v1
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - JWT_SECRET=${JWT_SECRET:-docforge-dev-secret-change-me}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-docforge-internal-token-change-me}
      - PUBLIC_WEB_URL=${PUBLIC_WEB_URL:-http://localhost:49261}
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:48080}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:49261}
      - TRUST_PROXY=${TRUST_PROXY:-true}
    volumes:
      - ./:/workspace:ro
      - docforge_store:/var/docforge/store

  source-manager:
    build:
      context: .
      dockerfile: services/source-manager/Dockerfile
    container_name: docforge-source-manager
    restart: unless-stopped
    depends_on:
      - api
    environment:
      - API_URL=http://api:8080
      - INTERVAL_SECONDS=300
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-docforge-internal-token-change-me}

  ingestion-worker:
    build:
      context: .
      dockerfile: services/ingestion-worker/Dockerfile
    container_name: docforge-ingestion-worker
    restart: unless-stopped
    depends_on:
      - api
    environment:
      - API_URL=http://api:8080
      - INTERVAL_SECONDS=15
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-docforge-internal-token-change-me}

  embedding-worker:
    build:
      context: .
      dockerfile: services/embedding-worker/Dockerfile
    container_name: docforge-embedding-worker
    restart: unless-stopped
    depends_on:
      - api
    environment:
      - API_URL=http://api:8080
      - INTERVAL_SECONDS=60
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-docforge-internal-token-change-me}

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    container_name: docforge-scheduler
    restart: unless-stopped
    depends_on:
      - api
    environment:
      - API_URL=http://api:8080
      - INTERVAL_SECONDS=180
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-docforge-internal-token-change-me}

  web-ui:
    build:
      context: .
      dockerfile: services/web-ui/Dockerfile
    container_name: docforge-web-ui
    restart: unless-stopped
    ports:
      - "49261:3000"
    depends_on:
      - api
    environment:
      - WEB_PORT=3000
      - API_URL=http://api:8080

volumes:
  mongo_data:
  docforge_store:
